# Thin caller workflow — delegates to reusable workflow in ClaudeCoach.
# Updates to the review logic are made centrally in ClaudeCoach;
# this file only needs to change if triggers or permissions change.
name: Claude PR Review (Two-Stage)

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  claude-review:
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
    uses: RexGoliath1/ClaudeCoach/.github/workflows/claude-review-reusable.yml@main
    secrets: inherit
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
